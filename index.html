<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#010714" />
  <title>锦儿宇宙</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #eef8ff;
      --muted: #a8bed4;
      --panel: rgba(5, 13, 24, 0.5);
      --panel-control: rgba(5, 13, 24, 0.52);
      --accent: #5be7ff;
      --deep: #01040b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 45%, #061328 0%, #010714 42%, #000105 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes fadeOutDown {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: grab;
    }

    #stage:active {
      cursor: grabbing;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: var(--panel-control);
      backdrop-filter: blur(16px);
    }

    .controls button {
      width: 44px;
      height: 44px;
      min-width: 44px;
      padding: 0;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--ink);
      font-size: 18px;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls button:hover {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.13);
    }

    .controls button.active {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.18);
      box-shadow: 0 0 18px rgba(91, 231, 255, 0.32);
    }

    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 12px 16px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(18px);
    }

    .info-panel h1 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.2;
    }

    .info-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .full-image-viewer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 28px;
      background: rgba(0, 3, 10, 0.92);
      backdrop-filter: blur(14px);
    }

    .full-image-viewer.show {
      display: grid;
    }

    .full-image-viewer img {
      max-width: min(92vw, 1280px);
      max-height: 82vh;
      object-fit: contain;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 8px;
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
      background: #000;
    }

    .full-image-viewer button {
      position: fixed;
      right: 24px;
      top: 24px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 8px;
      background: rgba(5, 13, 24, 0.74);
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s, color 0.16s;
    }

    .full-image-viewer button:hover {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.1);
      color: var(--ink);
    }

    .slideshow-player {
      position: fixed;
      inset: 0;
      z-index: 21;
      display: none;
      place-items: center;
      padding: clamp(18px, 4vw, 44px);
      background: #000;
      opacity: 0;
      transition: opacity 0.72s ease;
    }

    .slideshow-player.show {
      display: grid;
    }

    .slideshow-player.visible {
      opacity: 1;
    }

    .slideshow-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .slideshow-nav {
      position: absolute;
      top: 50%;
      z-index: 2;
      width: clamp(42px, 7vw, 62px);
      min-height: clamp(54px, 9vw, 82px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.34);
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      transform: translateY(-50%);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: background 0.16s, color 0.16s;
    }

    .slideshow-nav:hover {
      background: rgba(91, 231, 255, 0.16);
      color: #ffffff;
    }

    .slideshow-nav.prev { left: clamp(10px, 3vw, 32px); }
    .slideshow-nav.next { right: clamp(10px, 3vw, 32px); }

    .slideshow-stage img {
      display: block;
      width: auto;
      height: auto;
      max-width: calc(100vw - clamp(36px, 8vw, 88px));
      max-height: calc(100vh - clamp(36px, 8vw, 88px));
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.24s ease;
    }

    .slideshow-player.visible .slideshow-stage img.ready {
      opacity: 1;
    }

    .slideshow-meta {
      position: absolute;
      left: clamp(14px, 4vw, 42px);
      right: clamp(14px, 4vw, 42px);
      bottom: clamp(12px, 3vw, 28px);
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto auto;
      gap: 10px;
      align-items: center;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(14px);
    }

    .slideshow-meta button {
      min-width: 38px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.86);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s;
    }

    .slideshow-meta button:hover {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.16);
    }

    .slideshow-meta strong,
    .slideshow-meta span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slideshow-meta span {
      color: var(--muted);
      font-size: 12px;
    }

    /* 弹幕容器 */
    .danmaku-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .danmaku-item {
      position: absolute;
      white-space: nowrap;
      font-size: 18px;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8), 0 0 10px rgba(91, 231, 255, 0.3);
      font-weight: 500;
      opacity: 0.95;
      will-change: transform;
      pointer-events: none;
    }

    /* 弹幕输入框 */
    .danmaku-input-container {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: var(--panel-control);
      backdrop-filter: blur(16px);
      max-width: 90vw;
      width: 400px;
    }

    .danmaku-input-container input {
      flex: 1;
      padding: 8px 16px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--ink);
      font-size: 14px;
      outline: none;
      transition: border-color 0.16s, background 0.16s;
    }

    .danmaku-input-container input:focus {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.1);
    }

    .danmaku-input-container input::placeholder {
      color: var(--muted);
    }

    .danmaku-input-container button {
      padding: 8px 20px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: rgba(91, 231, 255, 0.18);
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s, transform 0.16s;
    }

    .danmaku-input-container button:hover {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.25);
      transform: scale(1.05);
    }

    .danmaku-input-container button:active {
      transform: scale(0.95);
    }

    /* 弹幕开关按钮 */
    .danmaku-toggle {
      position: fixed;
      bottom: 90px;
      right: 20px;
      z-index: 10;
      padding: 8px 16px;
      border: 1px solid rgba(120, 216, 255, 0.22);
      border-radius: 999px;
      background: var(--panel-control);
      backdrop-filter: blur(16px);
      color: var(--ink);
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s;
    }

    .danmaku-toggle:hover {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.13);
    }

    .danmaku-toggle.active {
      border-color: rgba(91, 231, 255, 0.8);
      background: rgba(91, 231, 255, 0.18);
      box-shadow: 0 0 18px rgba(91, 231, 255, 0.32);
    }

    @media (max-width: 720px) {
      .controls {
        bottom: max(14px, calc(env(safe-area-inset-bottom) + 14px));
        padding: 8px;
      }

      .controls button {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }

      .info-panel {
        top: max(10px, env(safe-area-inset-top));
        left: max(10px, env(safe-area-inset-left));
        padding: 10px 12px;
      }

      .info-panel h1 {
        font-size: 14px;
      }

      .info-panel p {
        font-size: 11px;
      }

      .slideshow-meta {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        width: auto;
        grid-template-columns: minmax(72px, 1fr) auto 44px 44px 44px;
        gap: 7px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.78);
      }

      .slideshow-meta button {
        min-width: 44px;
        width: 44px;
        min-height: 44px;
        padding: 0;
      }

      .danmaku-input-container {
        bottom: 80px;
        width: 90vw;
        max-width: 350px;
        padding: 10px 14px;
      }

      .danmaku-input-container input {
        font-size: 13px;
        padding: 6px 12px;
      }

      .danmaku-input-container button {
        padding: 6px 16px;
        font-size: 13px;
      }

      .danmaku-toggle {
        bottom: 80px;
        right: 10px;
        padding: 6px 12px;
        font-size: 13px;
      }

      .danmaku-item {
        font-size: 16px;
      }
    }
    /* 登录遮罩 */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 45%, #061328 0%, #010714 42%, #000105 100%);
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(120,216,255,0.22);
      border-radius: 12px;
      background: rgba(5,13,24,0.7);
      backdrop-filter: blur(18px);
      max-width: 360px;
      width: 90%;
    }
    .login-box h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--ink);
    }
    .login-box p {
      margin: 0 0 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(120,216,255,0.22);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      text-align: center;
      box-sizing: border-box;
    }
    .login-box input:focus {
      border-color: rgba(91,231,255,0.8);
      background: rgba(91,231,255,0.1);
    }
    .login-box button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(91,231,255,0.4);
      border-radius: 8px;
      background: rgba(91,231,255,0.15);
      color: var(--ink);
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: rgba(91,231,255,0.25); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      padding: 6px 14px;
      border: 1px solid rgba(120,216,255,0.22);
      border-radius: 6px;
      background: rgba(5,13,24,0.5);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.16s, background 0.16s;
    }
    .logout-btn:hover {
      border-color: rgba(91,231,255,0.8);
      background: rgba(91,231,255,0.1);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <!-- 登录遮罩 -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>锦儿宇宙</h2>
      <p>请输入密码查看</p>
      <input type="text" id="loginPassword" placeholder="输入密码" maxlength="30" />
      <button id="loginBtn">进入</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>
  <!-- 退出按钮 -->
  <button id="logoutBtn" class="logout-btn hidden">退出</button>

  <div id="stage" aria-label="3D 照片记忆星球"></div>
  
  <div class="info-panel">
    <h1>锦儿宇宙</h1>
    <p>拖动旋转 · 滚轮缩放 · 点击查看</p>
  </div>

  <div class="controls">
    <button id="playBtn" type="button" aria-label="播放幻灯片" title="播放幻灯片">▶</button>
    <button id="openBtn" type="button" aria-label="展开星球" title="展开星球">✺</button>
    <button id="collapseBtn" type="button" aria-label="收回星球" title="收回星球" style="display:none">◉</button>
    <button id="gridBtn" type="button" aria-label="网格布局" title="网格布局">▦</button>
  </div>

  <!-- 弹幕容器 -->
  <div id="danmakuContainer" class="danmaku-container"></div>

  <!-- 弹幕输入框 -->
  <div class="danmaku-input-container">
    <input type="text" id="danmakuInput" placeholder="发送弹幕..." maxlength="50" />
    <button id="sendDanmakuBtn">发送</button>
  </div>

  <!-- 弹幕开关按钮 -->
  <button id="danmakuToggle" class="danmaku-toggle active">弹幕开</button>

  <div id="fullImageViewer" class="full-image-viewer">
    <button id="fullImageClose" type="button">×</button>
    <img id="fullImage" alt="全屏照片" />
  </div>

  <div id="slideshowPlayer" class="slideshow-player">
    <div class="slideshow-stage">
      <button id="slideshowPrev" class="slideshow-nav prev">‹</button>
      <img id="slideshowImage" alt="自动播放照片" />
      <button id="slideshowNext" class="slideshow-nav next">›</button>
    </div>
    <div class="slideshow-meta">
      <strong id="slideshowTitle">照片播放</strong>
      <span id="slideshowCounter">0 / 0</span>
      <button id="slideshowRestart" type="button" title="重播">↺</button>
      <button id="slideshowPause" type="button" title="暂停">⏸</button>
      <button id="slideshowClose" type="button" title="关闭">×</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    // ====== 登录逻辑 ======
    (function() {
      // 在这里设置有效密码
      const VALID_PASSWORDS = ['锦儿大王', '菠萝大王'];

      const overlay = document.getElementById('loginOverlay');
      const passwordInput = document.getElementById('loginPassword');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      // 每次刷新都显示登录
      overlay.classList.remove('hidden');
      passwordInput.focus();

      function doLogin() {
        const password = passwordInput.value.trim();
        if (!password) { loginError.textContent = '请输入密码'; return; }
        if (VALID_PASSWORDS.includes(password)) {
          overlay.classList.add('hidden');
        } else {
          loginError.textContent = '密码错误';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }

      loginBtn.addEventListener('click', doLogin);
      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
      });
    })();

    // ====== 弹幕配置 ======
    const DANMAKU_API_URL = ''; // 同域名 Pages Functions
    var state; // 全局
    var danmakuContainer; // 全局
    let danmakuListening = false;
    let lastDanmakuTime = Date.now();
    let useLocalMode = false; // 云端同步
    const DANMAKU_STORAGE_KEY = 'photo_ball_danmaku';
    let danmakuRetryCount = 0;
    const MAX_RETRY_COUNT = 3;

    // 初始化弹幕服务
    function initDanmakuService() {
      console.log('弹幕服务初始化中...');
      startDanmakuListener();
    }

    // 创建弹幕DOM元素（全局函数）
    function createDanmakuElement(text, color = '#fff') {
      if (!state || !state.danmakuEnabled) return;
      const danmakuItem = document.createElement('div');
      danmakuItem.className = 'danmaku-item';
      danmakuItem.textContent = text;
      danmakuItem.style.color = color;
      const trackIndex = Math.floor(Math.random() * (state.danmakuTracks || []).length);
      const topPos = trackIndex * 40 + Math.random() * 20;
      danmakuItem.style.top = topPos + 'px';
      const screenWidth = window.innerWidth;
      danmakuItem.style.left = screenWidth + 'px';
      danmakuContainer.appendChild(danmakuItem);
      const textWidth = danmakuItem.offsetWidth;
      const duration = 8 + (textWidth / screenWidth) * 4;
      const animation = danmakuItem.animate([
        { transform: 'translateX(0)' },
        { transform: 'translateX(-' + (screenWidth + textWidth) + 'px)' }
      ], { duration: duration * 1000, easing: 'linear' });
      animation.onfinish = function() { danmakuItem.remove(); };
    }

    // 加载历史弹幕并开始监听
    async function startDanmakuListener() {
      // 先尝试使用API加载历史弹幕
      try {
        const response = await fetch(DANMAKU_API_URL + '/api/danmaku?action=list');
        
        if (!response.ok) {
          throw new Error('HTTP error: ' + response.status);
        }
        
        const data = await response.json();
        
        if (data.code === 0 && data.data && data.data.length > 0) {
          data.data.forEach((danmaku, index) => {
            setTimeout(() => {
              if (danmaku.text && typeof state !== 'undefined' && state && state.danmakuEnabled) {
                createDanmakuElement(danmaku.text, danmaku.color);
                if (danmaku.timestamp > lastDanmakuTime) {
                  lastDanmakuTime = danmaku.timestamp;
                }
              }
            }, index * 300);
          });
        }
        console.log('历史弹幕加载成功（云端）');
        danmakuRetryCount = 0;
      } catch (error) {
        console.error('加载历史弹幕失败:', error);
        danmakuRetryCount++;
        
        if (danmakuRetryCount >= MAX_RETRY_COUNT) {
          console.log('重试次数过多，切换到本地模式');
          useLocalMode = true;
          loadLocalDanmaku();
          return;
        }
        
        console.log('重试加载历史弹幕...(' + danmakuRetryCount + '/' + MAX_RETRY_COUNT + ')');
        setTimeout(startDanmakuListener, 2000);
        return;
      }

      // 开始监听新弹幕
      if (!danmakuListening) {
        danmakuListening = true;
        listenForNewDanmaku();
      }
    }

    // 监听新弹幕
    async function listenForNewDanmaku() {
      if (!danmakuListening || useLocalMode) return;

      try {
        const response = await fetch(DANMAKU_API_URL + '/api/danmaku?action=new&lastTime=' + lastDanmakuTime);
        
        if (!response.ok) {
          throw new Error('HTTP error: ' + response.status);
        }
        
        const data = await response.json();

        if (data.code === 0 && data.data && data.data.length > 0) {
          data.data.forEach((danmaku) => {

    function createStarField() {
      const starsGeometry = new THREE.BufferGeometry();
      const starCount = 5200;
      const positions = new Float32Array(starCount * 3);
      const colors = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const i3 = i * 3;
        const radius = 25 + Math.random() * 75;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        
        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);

        const colorChoice = Math.random();
        if (colorChoice < 0.7) {
          colors[i3] = 1;
          colors[i3 + 1] = 1;
          colors[i3 + 2] = 1;
        } else if (colorChoice < 0.85) {
          colors[i3] = 0.8;
          colors[i3 + 1] = 0.9;
          colors[i3 + 2] = 1;
        } else {
          colors[i3] = 0.9;
          colors[i3 + 1] = 0.8;
          colors[i3 + 2] = 1;
        }

        sizes[i] = Math.random() * 2 + 0.5;
      }

      starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const starsMaterial = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 },
          pixelRatio: { value: window.devicePixelRatio }
        },
        vertexShader: `
          attribute float size;
          varying vec3 vColor;
          uniform float pixelRatio;
          uniform float time;
          void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            float twinkle = sin(time * 0.5 + position.x * 0.1 + position.y * 0.1 + position.z * 0.1) * 0.3 + 0.7;
            gl_PointSize = size * pixelRatio * (300.0 / -mvPosition.z) * twinkle;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            float alpha = 1.0 - dist * 2.0;
            gl_FragColor = vec4(vColor, alpha);
          }
        `,
        transparent: true,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const stars = new THREE.Points(starsGeometry, starsMaterial);
      scene.add(stars);
      return stars;
    }

    async function sendDanmaku() {
      const text = danmakuInput.value.trim();
      if (!text) return;

      // 随机颜色
      const colors = ['#ffffff', '#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da', '#fcbad3'];

      const danmakuData = {
        text: text,
        color: color,
        timestamp: Date.now()
      };

      // 如果是本地模式，直接保存到localStorage
      if (useLocalMode) {
        try {
          const stored = localStorage.getItem(DANMAKU_STORAGE_KEY);
          const localList = stored ? JSON.parse(stored) : [];
          localList.push(danmakuData);
          
          // 最多保存100条
          if (localList.length > 100) {
            localList.splice(0, localList.length - 100);
          }
          
          localStorage.setItem(DANMAKU_STORAGE_KEY, JSON.stringify(localList));
          
          // 立即显示弹幕
          if (state && state.danmakuEnabled) {
            createDanmakuElement(danmakuData.text, danmakuData.color);
          }
          
          danmakuInput.value = '';
          console.log('弹幕发送成功（本地）');
          // 提醒用户当前是本地模式
          showToast('弹幕已发送（本地模式），其他设备可能无法看到');
          return;
        } catch (error) {
          console.error('本地保存弹幕失败:', error);
          alert('发送弹幕失败');
          return;
        }
      }

      // 使用HTTP API发送弹幕
      try {
        const response = await fetch(DANMAKU_API_URL + '/api/danmaku', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            action: 'add',
            ...danmakuData
          })
        });

        const result = await response.json();
        
        if (result.code === 0) {
          // 清空输入框
          danmakuInput.value = '';
          console.log('弹幕发送成功（云端）');
          // 立即显示弹幕
          if (state && state.danmakuEnabled) {
            createDanmakuElement(danmakuData.text, danmakuData.color);
          }
        } else {
          throw new Error(result.message || '发送失败');
        }
      } catch (error) {
        console.error('发送弹幕失败:', error);
        // 降级到本地模式保存
        try {
          const stored = localStorage.getItem(DANMAKU_STORAGE_KEY);
          const localList = stored ? JSON.parse(stored) : [];
          localList.push(danmakuData);
          
          if (localList.length > 100) {
            localList.splice(0, localList.length - 100);
          }
          
          localStorage.setItem(DANMAKU_STORAGE_KEY, JSON.stringify(localList));
          
          // 立即显示弹幕
          if (typeof state !== 'undefined' && state && state.danmakuEnabled) {
            createDanmakuElement(danmakuData.text, danmakuData.color);
          }
          
          danmakuInput.value = '';
          // 设置为本地模式，下次直接使用本地存储
          useLocalMode = true;
          showToast('云端服务不可用！弹幕已保存到本地，其他设备暂时无法看到');
        } catch (localError) {
          console.error('本地保存也失败:', localError);
          alert('发送弹幕失败，请检查网络连接');
        }
      }
    }

    function createPhotoSprites() {
      state.photoSprites.forEach(sprite => {
        photoLayer.remove(sprite);
        sprite.material.dispose();
        if (sprite.material.map) {
          sprite.material.map.dispose();
        }
      });
      state.photoSprites = [];

      const photos = state.photos;
      const planetRadius = 2;
      const photoSize = 0.45;

      photos.forEach((photo, index) => {
        const phi = Math.acos(-1 + (2 * index) / photos.length);
        const theta = Math.sqrt(photos.length * Math.PI) * phi;

        const x = planetRadius * Math.sin(phi) * Math.cos(theta);
        const y = planetRadius * Math.sin(phi) * Math.sin(theta);
        const z = planetRadius * Math.cos(phi);

        const aspectRatio = photo.width / photo.height;
        const spriteSize = new THREE.Vector2(photoSize * aspectRatio, photoSize);

        const texture = new THREE.CanvasTexture(photo.image);
        texture.colorSpace = THREE.SRGBColorSpace;

        const material = new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
          opacity: 0.95,
          depthWrite: false
        });

        const sprite = new THREE.Sprite(material);
        sprite.position.set(x, y, z);
        sprite.scale.set(spriteSize.x, spriteSize.y, 1);
        sprite.lookAt(camera.position);

        sprite.userData = {
          photoIndex: index,
          originalPosition: new THREE.Vector3(x, y, z),
          originalScale: new THREE.Vector3(spriteSize.x, spriteSize.y, 1),
          aspectRatio: aspectRatio
        };

        photoLayer.add(sprite);
        state.photoSprites.push(sprite);
      });
    }

    function openPlanet() {
      state.isOpen = true;
      openBtn.style.display = 'none';
      collapseBtn.style.display = 'flex';

      const planetRadius = 4;
      state.photoSprites.forEach((sprite, index) => {
        const photos = state.photos;
        const phi = Math.acos(-1 + (2 * index) / photos.length);
        const theta = Math.sqrt(photos.length * Math.PI) * phi;

        const x = planetRadius * Math.sin(phi) * Math.cos(theta);
        const y = planetRadius * Math.sin(phi) * Math.sin(theta);
        const z = planetRadius * Math.cos(phi);

        animateSpritePosition(sprite, x, y, z);
        animateSpriteScale(sprite, sprite.userData.originalScale.x * 1.5, sprite.userData.originalScale.y * 1.5);
      });
    }

    function collapsePlanet() {
      state.isOpen = false;
      collapseBtn.style.display = 'none';
      openBtn.style.display = 'flex';

      state.photoSprites.forEach((sprite) => {
        const origPos = sprite.userData.originalPosition;
        animateSpritePosition(sprite, origPos.x, origPos.y, origPos.z);
        animateSpriteScale(sprite, sprite.userData.originalScale.x, sprite.userData.originalScale.y);
      });
    }

    function animateSpritePosition(sprite, x, y, z) {
      const startPos = sprite.position.clone();
      const endPos = new THREE.Vector3(x, y, z);
      const duration = 800;
      const startTime = performance.now();

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);

        sprite.position.lerpVectors(startPos, endPos, eased);

        if (progress < 1) {
          requestAnimationFrame(animate);
        }
      }

      requestAnimationFrame(animate);
    }

    function animateSpriteScale(sprite, x, y) {
      const startScale = sprite.scale.clone();
      const endScale = new THREE.Vector3(x, y, 1);
      const duration = 800;
      const startTime = performance.now();

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);

        sprite.scale.lerpVectors(startScale, endScale, eased);

        if (progress < 1) {
          requestAnimationFrame(animate);
        }
      }

      requestAnimationFrame(animate);
    }

    function toggleGridLayout() {
      state.isGridLayout = !state.isGridLayout;
      gridBtn.classList.toggle('active', state.isGridLayout);

      if (state.isGridLayout) {
        const cols = Math.ceil(Math.sqrt(state.photoSprites.length));
        const rows = Math.ceil(state.photoSprites.length / cols);
        const spacing = 0.8;
        const startX = -(cols - 1) * spacing / 2;
        const startY = (rows - 1) * spacing / 2;

        state.photoSprites.forEach((sprite, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const x = startX + col * spacing;
          const y = startY - row * spacing;
          const z = -3;

          animateSpritePosition(sprite, x, y, z);
        });
      } else {
        collapsePlanet();
      }
    }

      if (state.slideshowActive) {
        state.currentSlideIndex = (state.currentSlideIndex - 1 + state.photos.length) % state.photos.length;
        showSlide(state.currentSlideIndex);
      }
    }

    function nextSlide() {
      if (state.slideshowActive) {
        state.currentSlideIndex = (state.currentSlideIndex + 1) % state.photos.length;
        showSlide(state.currentSlideIndex);
      }
    }

    function restartSlideshow() {
      if (state.slideshowActive) {
        showSlide(0);
      }
    }

    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let targetRotationX = 0;
    let targetRotationY = 0;

    function onMouseDown(event) {
      isDragging = true;
      previousMousePosition = {
        x: event.clientX,
        y: event.clientY
      };
    }

    function onMouseMove(event) {
      if (!isDragging) return;

      const deltaMove = {
        x: event.clientX - previousMousePosition.x,
        y: event.clientY - previousMousePosition.y
      };

      targetRotationY += deltaMove.x * 0.005;
      targetRotationX += deltaMove.y * 0.005;
      targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));

      previousMousePosition = {
        x: event.clientX,
        y: event.clientY
      };
    }

    function onMouseUp() {
      isDragging = false;
    }

    function onTouchStart(event) {
      if (event.touches.length === 1) {
        isDragging = true;
        previousMousePosition = {
          x: event.touches[0].clientX,
          y: event.touches[0].clientY
        };
      } else if (event.touches.length === 2) {
        const touch1 = event.touches[0];
        const touch2 = event.touches[1];
        state.lastTouchDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
      }
    }

    function onTouchMove(event) {
      event.preventDefault();

      if (event.touches.length === 1 && isDragging) {
        const deltaMove = {
          x: event.touches[0].clientX - previousMousePosition.x,
          y: event.touches[0].clientY - previousMousePosition.y
        };

        targetRotationY += deltaMove.x * 0.005;
        targetRotationX += deltaMove.y * 0.005;
        targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));

        previousMousePosition = {
          x: event.touches[0].clientX,
          y: event.touches[0].clientY
        };
      } else if (event.touches.length === 2) {
        const touch1 = event.touches[0];
        const touch2 = event.touches[1];
        const distance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
        const scale = distance / state.lastTouchDistance;
        
        camera.position.z = Math.max(3, Math.min(15, camera.position.z / scale));
        
        state.lastTouchDistance = distance;
      }
    }

    function onTouchEnd() {
      isDragging = false;
    }

    function onWheel(event) {
      event.preventDefault();
      const zoomSpeed = 0.001;
      camera.position.z += event.deltaY * zoomSpeed * camera.position.z;
      camera.position.z = Math.max(3, Math.min(15, camera.position.z));
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(event) {
      if (event.key === 'Escape') {
        closeFullImage();
        stopSlideshow();
      }

      if (state.slideshowActive) {
        if (event.key === 'ArrowLeft') {
          prevSlide();
        } else if (event.key === 'ArrowRight') {
          nextSlide();
        } else if (event.key === ' ') {
          event.preventDefault();
          pauseSlideshow();
        }
      }
    }

    function onDoubleClick(event) {
      if (state.slideshowActive || fullImageViewer.classList.contains('show')) return;

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(state.photoSprites);

      if (intersects.length > 0) {
        const photoIndex = intersects[0].object.userData.photoIndex;
        openFullImage(photoIndex);
      }
    }

    mount.addEventListener('mousedown', onMouseDown);
    mount.addEventListener('mousemove', onMouseMove);
    mount.addEventListener('mouseup', onMouseUp);
    mount.addEventListener('mouseleave', onMouseUp);
    mount.addEventListener('wheel', onWheel, { passive: false });
    mount.addEventListener('dblclick', onDoubleClick);
    mount.addEventListener('touchstart', onTouchStart, { passive: true });
    mount.addEventListener('touchmove', onTouchMove, { passive: false });
    mount.addEventListener('touchend', onTouchEnd);
    window.addEventListener('resize', onResize);
    window.addEventListener('keydown', onKeyDown);

    playBtn.addEventListener('click', startSlideshow);
    openBtn.addEventListener('click', openPlanet);
    collapseBtn.addEventListener('click', collapsePlanet);
    gridBtn.addEventListener('click', toggleGridLayout);
    fullImageClose.addEventListener('click', closeFullImage);
    slideshowPrev.addEventListener('click', prevSlide);
    slideshowNext.addEventListener('click', nextSlide);
    slideshowRestart.addEventListener('click', restartSlideshow);
    slideshowPause.addEventListener('click', pauseSlideshow);
    slideshowClose.addEventListener('click', stopSlideshow);
    
    // 弹幕事件监听
    sendDanmakuBtn.addEventListener('click', sendDanmaku);
    danmakuInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendDanmaku();
      }
    });
    danmakuToggle.addEventListener('click', toggleDanmaku);

    let animationId;
    let time = 0;

    function animate() {
      animationId = requestAnimationFrame(animate);
      time += 0.016;

      starField.material.uniforms.time.value = time;
      innerGlow.material.uniforms.time.value = time;

      if (!isDragging && !state.isGridLayout) {
        globe.rotation.y += state.autoRotateSpeed;
        photoLayer.rotation.y += state.autoRotateSpeed;
      }

      globe.rotation.x += (targetRotationX - globe.rotation.x) * 0.05;
      globe.rotation.y += (targetRotationY - globe.rotation.y) * 0.05;
      photoLayer.rotation.x += (targetRotationX - photoLayer.rotation.x) * 0.05;
      photoLayer.rotation.y += (targetRotationY - photoLayer.rotation.y) * 0.05;

      if (!state.isGridLayout) {
        state.photoSprites.forEach(sprite => {
          sprite.lookAt(camera.position);
        });
      }

      renderer.render(scene, camera);
    }

    loadPhotos();

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(animationId);
      if (state.slideshowInterval) {
        clearInterval(state.slideshowInterval);
      }
    });
    });
  </script>
</body>
</html>
